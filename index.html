<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mise-On : Smart Kitchen System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #cbd5e1; gap: 1px; border: 1px solid #cbd5e1; flex: 1; overflow-y: auto; }
        .calendar-grid { grid-auto-rows: minmax(60px, 1fr); } 
        @media (min-width: 1024px) { .calendar-grid { grid-template-rows: 25px repeat(6, 1fr); grid-auto-rows: auto; } }
        .calendar-header { background: #f8fafc; text-align: center; font-size: 9px; font-weight: 900; color: #94a3b8; padding: 4px 0; }
        .calendar-day { background: white; padding: 2px 4px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; min-height: 0; position: relative; }
        .calendar-day.selected { background: #eff6ff !important; box-shadow: inset 0 0 0 2px #3b82f6; z-index: 10; }
        .menu-text { font-size: 9px; font-weight: 800; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; padding: 1px 2px; border-radius: 2px; }
        
        .modal-view { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; padding: 15px; animation: slideUp 0.3s ease-out; }
        .recipe-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .notice-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1200; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
        .zoom-popup { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1500; display: flex; flex-direction: column; padding: 20px; animation: zoomIn 0.2s ease-out; }
        
        .recipe-tag { display: inline-block; background: #eff6ff; color: #2563eb; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; margin-right: 4px; margin-top: 4px; border: 1px solid #bfdbfe; cursor: pointer; transition: all 0.2s; }
        .recipe-content { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.7; white-space: pre-wrap; }
        .hl-red { color: #ef4444; text-decoration: underline; font-weight: 900; }
        
        .top-banner { background: #4f46e5; color: white; padding: 8px 16px; font-size: 12px; font-weight: 700; text-align: center; animation: slideDown 0.5s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 10px rgba(79, 70, 229, 0.2); }
        .banner-icon { background: white; color: #4f46e5; border-radius: 4px; padding: 0 4px; font-size: 10px; font-weight: 900; flex-shrink: 0; }

        .login-screen { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 320px; text-align: center; }
        .login-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; margin-bottom: 12px; outline: none; transition: all 0.2s; font-weight: 700; }
        .login-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .login-btn { width: 100%; background: #3b82f6; color: white; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 14px; transition: all 0.2s; margin-top: 4px; }
        
        .imp-check { width: 18px; height: 18px; accent-color: #f59e0b; cursor: pointer; }
        
        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const getFoodEmoji = (name, category) => {
            if(!name) return '✨';
            const n = name.replace(/\s+/g, '');
            if(n.includes('딸기')) return '🍓'; if(n.includes('당근')) return '🥕';
            if(n.includes('귤')) return '🍊'; if(n.includes('꼬막')) return '🦪';
            if(n.includes('게')) return '🦀'; if(n.includes('낙지')) return '🐙';
            if(n.includes('생선')) return '🐟'; if(n.includes('고기')) return '🍖';
            if(category?.includes('수산')) return '🐟';
            if(category?.includes('채소')) return '🥬';
            return '🍽️';
        };

        const formatImageUrl = (url) => {
            if (!url) return "";
            const match1 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            const match2 = url.match(/id=([a-zA-Z0-9_-]+)/);
            const fileId = match1 ? match1[1] : (match2 ? match2[1] : null);
            if (fileId) {
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
            }
            return url;
        };

        const findMatchedRecipes = (menuName, recipeMap) => {
            if (!menuName || menuName === "일정없음" || !recipeMap) return [];
            const cleanMenu = menuName.replace(/[^가-힣]/g, "");
            return Object.values(recipeMap).filter(r => cleanMenu.includes(r.key.replace(/[^가-힣]/g, "")));
        };

        const highlightText = (text, query) => {
            if (!query || !text || !isNaN(query)) return text;
            const parts = text.split(new RegExp(`(${query})`, 'gi'));
            return parts.map((p, i) => p.toLowerCase() === query.toLowerCase() ? <span key={i} className="hl-red">{p}</span> : p);
        };

        const MenuCard = ({text, type, query, recipeMap, setPopupRecipes, setActiveRecipeIndex}) => {
            const matched = findMatchedRecipes(text, recipeMap);
            return (
                <div className={`p-4 rounded-xl border mb-3 transition-all ${matched.length > 0 ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-slate-50 border-slate-100'}`}>
                    <div className="text-[10px] font-black text-slate-400 uppercase mb-1">{type}</div>
                    <div className="text-sm font-black text-slate-700 mb-2 leading-relaxed whitespace-pre-wrap">
                        {highlightText(text, query)}
                    </div>
                    {matched.length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-2 pt-2 border-t border-blue-100">
                            {matched.map((r, idx) => (
                                <span key={idx} className="recipe-tag" onClick={() => { setPopupRecipes(matched); setActiveRecipeIndex(idx); }}>📖 {r.name}</span>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const WeeklyMenuRow = ({ label, colorClass, text, recipeMap, setPopupRecipes, setActiveRecipeIndex }) => {
            if(!text) return <div className="flex gap-2 text-sm"><span className={`w-8 font-bold ${colorClass}`}>{label}</span><span className="text-slate-300">-</span></div>;
            const matched = findMatchedRecipes(text, recipeMap);
            return (
                <div className="flex gap-2 text-sm items-start">
                    <span className={`w-8 font-bold ${colorClass} shrink-0`}>{label}</span>
                    <div className="flex-1">
                        <span className="font-bold text-slate-700">{text}</span>
                        {matched.length > 0 && (
                            <div className="flex flex-wrap gap-1 mt-1">
                                {matched.map((r, idx) => (
                                    <span key={idx} className="recipe-tag" onClick={() => { setPopupRecipes(matched); setActiveRecipeIndex(idx); }}>📖 {r.name}</span>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MiseOnApp = () => {
            const USER_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=1190342038&single=true&output=csv";
            const MENU_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=0&single=true&output=csv";
            const RECIPE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoOE5m6eIgIRn6Pt09QvLjBFIokFX-hk04n1XOTX89eRg-3-eQSgv4QlJjdUyrpsYNtc9Y-q5uqv9n/pub?gid=949808515&single=true&output=csv";
            const NOTICE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=489171005&single=true&output=csv";
            const SEASONAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=1051704487&single=true&output=csv";
            const REPORT_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=949601099&single=true&output=csv";

            const ADMIN_NAME = "관리자"; const ADMIN_CODE = "2026";
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState("");
            const [inputName, setInputName] = useState("");
            const [inputCode, setInputCode] = useState("");
            const [userList, setUserList] = useState([]);
            const [menus, setMenus] = useState([]);
            const [recipeMap, setRecipeMap] = useState({});
            const [seasonalData, setSeasonalData] = useState([]);
            const [reports, setReports] = useState([]);
            const [activeBanner, setActiveBanner] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(new Date()); 
            const [selectedDate, setSelectedDate] = useState(null);
            const [activeModal, setActiveModal] = useState(false);
            const [weeklyModal, setWeeklyModal] = useState(false);
            const [seasonalModal, setSeasonalModal] = useState(false);
            const [reportModal, setReportModal] = useState(false);
            const [activeReportTab, setActiveReportTab] = useState('아침');
            const [popupRecipes, setPopupRecipes] = useState([]);
            const [activeRecipeIndex, setActiveRecipeIndex] = useState(0);
            const [searchTerm, setSearchTerm] = useState("");
            const [modalSearch, setModalSearch] = useState("");
            const [isRefreshing, setIsRefreshing] = useState(false);

            const fetchData = (forceFresh = false) => {
                if(forceFresh) setIsRefreshing(true);
                const getUrl = (url) => forceFresh ? `${url}&t=${new Date().getTime()}` : url;

                Papa.parse(getUrl(USER_URL), { download: true, complete: (res) => {
                    const users = []; res.data.forEach(row => { if (row[1]) users.push({ name: row[0].trim(), code: row[1].trim() }); });
                    setUserList(users);
                }});

                Papa.parse(getUrl(MENU_URL), { download: true, complete: (res) => {
                    let temp = []; let headers = [];
                    res.data.forEach(row => {
                        const label = (row[0] || "").replace(/\s/g, ""); const vals = row.slice(1);
                        if (label === "날짜") {
                            headers = vals.map(v => {
                                const m = (v || "").match(/(\d{4})[^\d]*(\d{1,2})[^\d]*(\d{1,2})/);
                                return m ? `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}` : null;
                            });
                            headers.forEach(d => { if(d) temp.push({ date: d, morning: "", lunch: "", dinner: "", duty: "", packing: "" }); });
                        } else if (headers.length > 0) {
                            vals.forEach((v, i) => {
                                if (!headers[i]) return;
                                const t = temp.find(m => m.date === headers[i]);
                                if (t && v && v.trim() !== "") {
                                    if (label.includes("아침")) t.morning = v;
                                    else if (label.includes("점심")) t.lunch = v;
                                    else if (label.includes("저녁")) t.dinner = v;
                                    else if (label.includes("근무") || label.includes("당직")) t.duty = t.duty ? t.duty + "/" + v : v;
                                }
                            });
                        }
                    });
                    setMenus(temp);
                    if(!selectedDate) setSelectedDate(temp.find(m => m.date === new Date().toISOString().split('T')[0]) || temp[0]);
                }});

                Papa.parse(getUrl(RECIPE_URL), { download: true, complete: (res) => {
                    const newRecipes = {};
                    res.data.forEach(row => {
                        if (row.length < 2 || !row[0] || row[0].includes("메뉴명")) return;
                        const key = row[0].trim();
                        let foundImage = "";
                        // ★ [v41.4] 시트 모든 칸을 뒤져서 http 링크 강제 추출 (v41.1의 스마트 스캐너 유지)
                        for(let i = 2; i < row.length; i++) {
                            if(row[i] && row[i].toString().includes('http')) {
                                const m = row[i].match(/(https?:\/\/[^\s]+)/);
                                if(m) { foundImage = m[0].trim(); break; }
                            }
                        }
                        newRecipes[key] = { key, name: row[1]||key, ingredients: row[2]||"", process: row[3]||"", tip: row[4]||"", nutrition: row[5]||"", image: foundImage };
                    });
                    setRecipeMap(newRecipes);
                    if(forceFresh) setIsRefreshing(false);
                }});

                Papa.parse(getUrl(SEASONAL_URL), { download: true, complete: (res) => {
                    const data = []; res.data.forEach(row => {
                        const m = parseInt(row[0]?.toString().replace(/[^0-9]/g, ''));
                        if(!isNaN(m)) data.push({ month: m, category: row[1]||"", name: row[2]||"", desc: row[3]||"", pairing: row[4]||"", menu: row[5]||"" });
                    });
                    setSeasonalData(data);
                }});

                Papa.parse(getUrl(REPORT_URL), { download: true, complete: (res) => {
                    const data = []; res.data.forEach(row => {
                        if(row[0] !== "날짜" && row.length >= 5) data.push({ date: row[0], type: row[1], beforeImg: row[2], afterImg: row[3], content: row[4], author: row[5] });
                    });
                    setReports(data);
                }});
            };

            useEffect(() => { if (isAuthenticated) fetchData(false); }, [isAuthenticated]);
            useEffect(() => { const saved = localStorage.getItem("misoyon_user"); if (saved) { setIsAuthenticated(true); setCurrentUser(saved); } }, []);

            const handleLogin = () => {
                const found = userList.find(u => u.name === inputName.trim() && u.code === inputCode.trim());
                if (found || (inputName === ADMIN_NAME && inputCode === ADMIN_CODE)) {
                    setIsAuthenticated(true); setCurrentUser(inputName); localStorage.setItem("misoyon_user", inputName);
                } else { alert("로그인 정보를 확인하세요."); }
            };

            const calDays = useMemo(() => {
                const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= lastDate; i++) {
                    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    days.push({ day: i, dateStr: ds, data: menus.find(m => m.date === ds) });
                }
                while (days.length < 42) days.push(null);
                return days;
            }, [currentMonth, menus]);

            const groupedSeasonal = useMemo(() => {
                return seasonalData.filter(d => d.month === currentMonth.getMonth() + 1).reduce((acc, item) => {
                    const cat = item.category || '기타'; if(!acc[cat]) acc[cat] = [];
                    acc[cat].push(item); return acc;
                }, {});
            }, [seasonalData, currentMonth]);

            if (!isAuthenticated) return (
                <div className="login-screen">
                    <div className="login-box">
                        <h1 className="text-3xl font-black italic mb-6">Mise-On</h1>
                        <input className="login-input" placeholder="이름" value={inputName} onChange={e=>setInputName(e.target.value)} />
                        <input className="login-input" type="password" placeholder="비밀번호" value={inputCode} onChange={e=>setInputCode(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
                        <button onClick={handleLogin} className="login-btn w-full bg-blue-600 text-white py-3 rounded-xl font-black">LOGIN</button>
                        <button onClick={()=>fetchData(true)} className="text-xs text-slate-400 mt-4 underline">최신 명단 갱신</button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-full w-full">
                    <header className="px-4 py-3 bg-white border-b flex flex-col gap-2 shrink-0">
                        <div className="flex justify-between items-center">
                            <h1 className="text-xl font-black italic">Mise-On <span className="text-blue-600 text-xs">v41.4</span></h1>
                            <div className="text-xs font-bold bg-blue-50 px-2 py-1 rounded">👨‍🍳 {currentUser}</div>
                        </div>
                        <div className="flex gap-2">
                            <div className="flex-1 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-sm">
                                {currentMonth.getFullYear()}년 {currentMonth.getMonth()+1}월
                            </div>
                            <button onClick={()=>fetchData(true)} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black flex items-center gap-1">
                                <span className={isRefreshing ? "spin-anim" : ""}>🔄</span> 갱신
                            </button>
                            <button onClick={()=>{localStorage.removeItem("misoyon_user"); window.location.reload();}} className="bg-red-500 text-white px-3 py-2 rounded-xl text-xs font-black">OUT</button>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        <div className="flex-[2] flex flex-col border-r overflow-hidden">
                            <div className="calendar-grid">
                                {['일','월','화','수','목','금','토'].map(d=><div key={d} className="calendar-header">{d}</div>)}
                                {calDays.map((d,i)=>(
                                    <div key={i} className={`calendar-day ${d?.dateStr === selectedDate?.date ? 'selected' : ''}`} onClick={()=>d?.data && setSelectedDate(d.data)}>
                                        {d && <><span className="text-[10px] font-black text-slate-800">{d.day}</span>
                                        {d.data && <div className="flex flex-col gap-[1px]">
                                            {d.data.morning && <div className="menu-text bg-orange-50 text-orange-600">조:{d.data.morning}</div>}
                                            {d.data.lunch && <div className="menu-text bg-blue-50 text-blue-600">중:{d.data.lunch}</div>}
                                            {d.data.dinner && <div className="menu-text bg-purple-50 text-purple-600">석:{d.data.dinner}</div>}
                                        </div>}</>}
                                    </div>
                                ))}
                            </div>
                            <div className="p-2 border-t flex gap-2">
                                <button onClick={()=>setSeasonalModal(true)} className="flex-1 bg-green-500 text-white py-3 rounded-xl font-black text-xs">🌿 제철 식재료</button>
                            </div>
                        </div>

                        <aside className="flex-1 p-4 overflow-y-auto bg-slate-50">
                            {selectedDate ? (
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center border-b-2 border-blue-600 pb-1">
                                        <h2 className="text-xl font-black italic">DAILY MENU</h2>
                                        <button onClick={()=>setWeeklyModal(true)} className="bg-slate-800 text-white px-3 py-1 rounded-lg text-xs font-bold">주간표</button>
                                    </div>
                                    {reports.filter(r=>r.date===selectedDate.date).length > 0 && (
                                        <button onClick={()=>setReportModal(true)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-sm">📷 현장 보고서 확인 ({reports.filter(r=>r.date===selectedDate.date).length})</button>
                                    )}
                                    <MenuCard text={selectedDate.morning} type="Morning" recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} />
                                    <MenuCard text={selectedDate.lunch} type="Lunch" recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} />
                                    <MenuCard text={selectedDate.dinner} type="Dinner" recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} />
                                </div>
                            ) : <div className="h-full flex items-center justify-center text-slate-300 font-black">날짜 선택</div>}
                        </aside>
                    </main>

                    {/* 레시피 팝업 */}
                    {popupRecipes.length > 0 && (
                        <div className="recipe-popup" onClick={()=>setPopupRecipes([])}>
                            <div className="bg-white rounded-3xl w-full max-w-lg p-6 shadow-2xl max-h-[85vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-xl font-black text-blue-600 italic">Recipe Master</h3>
                                    <button onClick={()=>setPopupRecipes([])} className="text-3xl">×</button>
                                </div>
                                <div className="flex gap-4 mb-4">
                                    <div className="flex-1">
                                        <div className="bg-blue-600 text-white px-3 py-1 rounded-full inline-block text-xs font-black mb-2">{popupRecipes[activeRecipeIndex].name}</div>
                                        <div className="text-[10px] font-black text-slate-400">Ingredients</div>
                                        <div className="recipe-content bg-slate-50 p-3 rounded-xl border">{popupRecipes[activeRecipeIndex].ingredients}</div>
                                    </div>
                                    {popupRecipes[activeRecipeIndex].image && (
                                        <img src={formatImageUrl(popupRecipes[activeRecipeIndex].image)} className="w-24 h-24 object-cover rounded-xl border shadow-sm" alt="레시피" />
                                    )}
                                </div>
                                <div className="space-y-4">
                                    <div className="text-[10px] font-black text-slate-400 uppercase">Instructions</div>
                                    <div className="recipe-content bg-slate-50 p-3 rounded-xl border">{popupRecipes[activeRecipeIndex].process}</div>
                                    {popupRecipes[activeRecipeIndex].tip && <div className="bg-orange-50 p-3 rounded-xl text-xs font-bold border border-orange-100">💡 {popupRecipes[activeRecipeIndex].tip}</div>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 보고서 팝업 */}
                    {reportModal && (
                        <div className="modal-view">
                            <div className="flex justify-between items-center mb-4 border-b pb-2 px-4">
                                <h2 className="text-xl font-black text-indigo-600">📷 현장 보고서</h2>
                                <button onClick={()=>setReportModal(false)} className="text-3xl">×</button>
                            </div>
                            <div className="flex gap-2 px-4 mb-4">
                                {['아침','점심','저녁'].map(t=>(
                                    <button key={t} onClick={()=>setActiveReportTab(t)} className={`flex-1 py-2 rounded-xl text-sm font-black ${activeReportTab===t ? 'bg-indigo-600 text-white':'bg-slate-200 text-slate-500'}`}>{t}</button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto px-4 space-y-4 pb-10">
                                {reports.find(r=>r.date===selectedDate.date && r.type===activeReportTab) ? (
                                    <>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div><div className="text-[10px] font-black text-slate-400 mb-1">식전</div><img src={formatImageUrl(reports.find(r=>r.date===selectedDate.date && r.type===activeReportTab).beforeImg)} className="w-full rounded-xl border" /></div>
                                            <div><div className="text-[10px] font-black text-slate-400 mb-1">식후</div><img src={formatImageUrl(reports.find(r=>r.date===selectedDate.date && r.type===activeReportTab).afterImg)} className="w-full rounded-xl border" /></div>
                                        </div>
                                        <div className="bg-white p-4 rounded-xl border shadow-sm font-bold text-slate-700 whitespace-pre-wrap">
                                            {reports.find(r=>r.date===selectedDate.date && r.type===activeReportTab).content}
                                        </div>
                                    </>
                                ) : <div className="text-center py-20 text-slate-300 font-bold italic">NO REPORT DATA</div>}
                            </div>
                        </div>
                    )}

                    {/* 제철재료 팝업 */}
                    {seasonalModal && (
                        <div className="modal-view">
                            <div className="flex justify-between items-center mb-4 border-b pb-2 px-4">
                                <h2 className="text-xl font-black text-green-600 italic">SEASONAL FOOD</h2>
                                <button onClick={()=>setSeasonalModal(false)} className="text-3xl">×</button>
                            </div>
                            <div className="flex-1 overflow-y-auto px-4 pb-10 space-y-6">
                                {Object.keys(groupedSeasonal).map(cat => (
                                    <div key={cat}>
                                        <div className="font-black text-green-800 border-b-2 border-green-500 w-max mb-3">{cat}</div>
                                        <div className="space-y-3">
                                            {groupedSeasonal[cat].map((item, i)=>(
                                                <div key={i} className="bg-white p-4 rounded-xl border flex gap-4 shadow-sm">
                                                    <div className="w-12 h-12 bg-slate-50 rounded flex items-center justify-center text-3xl shrink-0">
                                                        {getFoodEmoji(item.name, item.category)}
                                                    </div>
                                                    <div>
                                                        <div className="font-black text-slate-800 text-lg">{item.name}</div>
                                                        <div className="text-xs text-slate-500 font-bold mb-2 leading-relaxed">{item.desc}</div>
                                                        {item.menu && <div className="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded inline-block">🍳 {item.menu}</div>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<MiseOnApp />);
    </script>
</body>
</html>
