<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mise-On : Smart Kitchen System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #cbd5e1; gap: 1px; border: 1px solid #cbd5e1; flex: 1; overflow-y: auto; }
        .calendar-grid { grid-auto-rows: minmax(60px, 1fr); } 
        @media (min-width: 1024px) { .calendar-grid { grid-template-rows: 25px repeat(6, 1fr); grid-auto-rows: auto; } }
        .calendar-header { background: #f8fafc; text-align: center; font-size: 9px; font-weight: 900; color: #94a3b8; padding: 4px 0; }
        .calendar-day { background: white; padding: 2px 4px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; min-height: 0; position: relative; }
        .calendar-day.selected { background: #eff6ff !important; box-shadow: inset 0 0 0 2px #3b82f6; z-index: 10; }
        .menu-text { font-size: 9px; font-weight: 800; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; padding: 1px 2px; border-radius: 2px; }
        
        .modal-view { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; padding: 15px; animation: slideUp 0.3s ease-out; }
        .recipe-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .notice-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1200; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
        .zoom-popup { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1500; display: flex; flex-direction: column; padding: 20px; animation: zoomIn 0.2s ease-out; }
        
        .recipe-tag { display: inline-block; background: #eff6ff; color: #2563eb; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; margin-right: 4px; margin-top: 4px; border: 1px solid #bfdbfe; cursor: pointer; transition: all 0.2s; }
        .recipe-content { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.7; white-space: pre-wrap; }
        .hl-red { color: #ef4444; text-decoration: underline; font-weight: 900; }
        
        .top-banner { background: #4f46e5; color: white; padding: 8px 16px; font-size: 12px; font-weight: 700; text-align: center; animation: slideDown 0.5s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 10px rgba(79, 70, 229, 0.2); }
        .banner-icon { background: white; color: #4f46e5; border-radius: 4px; padding: 0 4px; font-size: 10px; font-weight: 900; flex-shrink: 0; }

        .login-screen { position: fixed; inset: 0; background: #f8fafc; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 320px; text-align: center; }
        .login-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; margin-bottom: 12px; outline: none; transition: all 0.2s; font-weight: 700; }
        .login-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .login-btn { width: 100%; background: #3b82f6; color: white; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 14px; transition: all 0.2s; margin-top: 4px; }
        
        .imp-check { width: 18px; height: 18px; accent-color: #f59e0b; cursor: pointer; }
        
        .spin-anim { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const getFoodEmoji = (name, category) => {
            if(!name) return '✨';
            const n = name.replace(/\s+/g, '');
            if(n.includes('딸기')) return '🍓';
            if(n.includes('당근')) return '🥕';
            if(n.includes('한라봉') || n.includes('귤')) return '🍊';
            if(n.includes('다래') || n.includes('키위')) return '🥝';
            if(n.includes('콜리플라워') || n.includes('방울양배추') || n.includes('양배추')) return '🥦';
            if(n.includes('꼬막') || n.includes('굴') || n.includes('새조개') || n.includes('조개')) return '🦪';
            if(n.includes('게') || n.includes('대게')) return '🦀';
            if(n.includes('문어') || n.includes('낙지') || n.includes('호래기') || n.includes('오징어')) return '🐙';
            if(n.includes('복어') || n.includes('아귀')) return '🐡';
            if(n.includes('새우')) return '🦐';
            if(n.includes('가자미') || n.includes('방어') || n.includes('대구') || n.includes('명태') || n.includes('삼치') || n.includes('도미') || n.includes('빙어') || n.includes('과메기')) return '🐟';
            if(n.includes('우엉') || n.includes('연근') || n.includes('더덕')) return '🥔';
            if(n.includes('봄동') || n.includes('시금치') || n.includes('파래') || n.includes('매생이') || n.includes('미역')) return '🌿';
            
            if(category && category.includes('수산')) return '🐟';
            if(category && (category.includes('과일') || category.includes('채소'))) return '🥬';
            
            return '🍽️';
        };

        const formatImageUrl = (url) => {
            if (!url) return "";
            const match1 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            const match2 = url.match(/id=([a-zA-Z0-9_-]+)/);
            const fileId = match1 ? match1[1] : (match2 ? match2[1] : null);
            if (fileId) return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
            return url;
        };

        const findMatchedRecipes = (menuName, recipeMap) => {
            if (!menuName || menuName === "일정없음" || !recipeMap) return [];
            const cleanMenu = menuName.toLowerCase().replace(/[^가-힣a-zA-Z0-9]/g, "");
            return Object.values(recipeMap).filter(recipe => {
                if (!recipe.key) return false;
                const fullKey = recipe.key.toLowerCase().replace(/[^가-힣a-zA-Z0-9]/g, "");
                const coreKey = recipe.key.toLowerCase().replace(/\(.*\)/g, "").replace(/[^가-힣a-zA-Z0-9]/g, "");
                return cleanMenu.includes(fullKey) || (coreKey.length > 1 && cleanMenu.includes(coreKey));
            });
        };

        const highlightText = (text, query) => {
            if (!query || !text || !isNaN(query)) return text;
            const parts = text.split(new RegExp(`(${query})`, 'gi'));
            return parts.map((p, i) => p.toLowerCase() === query.toLowerCase() ? <span key={i} className="hl-red">{p}</span> : p);
        };

        const MenuCard = ({text, type, query, recipeMap, setPopupRecipes, setActiveRecipeIndex, onExpand}) => {
            const matched = findMatchedRecipes(text, recipeMap);
            return (
                <div onClick={() => onExpand && onExpand(type, text)} className={`p-4 rounded-xl border mb-3 transition-all cursor-pointer ${matched.length > 0 ? 'bg-blue-50 border-blue-200 hover:bg-blue-100' : 'bg-slate-50 border-slate-100 hover:bg-slate-100'}`}>
                    <div className="text-[10px] font-black text-slate-400 uppercase mb-1 flex justify-between">
                        <span>{type}</span>
                        <span className="text-xs text-slate-300">🔍 확대</span>
                        {matched.length > 0 && <span className="text-blue-500">Found: {matched.length}</span>}
                    </div>
                    <div className="text-sm font-black text-slate-700 mb-2 leading-relaxed whitespace-pre-wrap">
                        {highlightText(text, query)}
                    </div>
                    {matched.length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-2 pt-2 border-t border-blue-100">
                            {matched.map((r, idx) => (
                                <span key={idx} className="recipe-tag" onClick={(e) => { e.stopPropagation(); setPopupRecipes(matched); setActiveRecipeIndex(idx); }}>📖 {r.name}</span>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const WeeklyMenuRow = ({ label, colorClass, text, recipeMap, setPopupRecipes, setActiveRecipeIndex }) => {
            if(!text) return <div className="flex gap-2 text-sm"><span className={`w-8 font-bold ${colorClass}`}>{label}</span><span className="text-slate-300">-</span></div>;
            const matched = findMatchedRecipes(text, recipeMap);
            return (
                <div className="flex gap-2 text-sm items-start">
                    <span className={`w-8 font-bold ${colorClass} shrink-0`}>{label}</span>
                    <div className="flex-1">
                        <span className="font-bold text-slate-700">{text}</span>
                        {matched.length > 0 && (
                            <div className="flex flex-wrap gap-1 mt-1">
                                {matched.map((r, idx) => (
                                    <span key={idx} className="recipe-tag" onClick={(e) => { e.stopPropagation(); setPopupRecipes(matched); setActiveRecipeIndex(idx); }}>📖 {r.name}</span>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MiseOnApp = () => {
            const getFreshUrl = (url) => `${url}&t=${new Date().getTime()}`;
            const USER_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=1190342038&single=true&output=csv";
            const MENU_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=0&single=true&output=csv";
            const RECIPE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoOE5m6eIgIRn6Pt09QvLjBFIokFX-hk04n1XOTX89eRg-3-eQSgv4QlJjdUyrpsYNtc9Y-q5uqv9n/pub?gid=949808515&single=true&output=csv";
            const NOTICE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=489171005&single=true&output=csv";
            const COMMENT_READ_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=918283439&single=true&output=csv";
            const COMMENT_WRITE_URL = "https://script.google.com/macros/s/AKfycbxQt7hG7JaH3HBD0ygYNezSlNFEuqLZJAv-22gDCTMET7z2nZs_MarT47Rxq7GlxBxC-Q/exec";
            const SEASONAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=1051704487&single=true&output=csv";
            const REPORT_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnsej-xGogyedNPYTs2iqEMFKAwIL3tipLoSiDDKxKHot-PITnmxYETDseGckqpb6EMiQm39Sfol0-/pub?gid=949601099&single=true&output=csv";

            const ADMIN_NAME = "관리자";
            const ADMIN_CODE = "2026";
            const INACTIVITY_LIMIT = 3 * 60 * 60 * 1000; 

            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState("");
            const [inputName, setInputName] = useState("");
            const [inputCode, setInputCode] = useState("");
            const [loginError, setLoginError] = useState("");
            const [userList, setUserList] = useState([]);
            
            const [menus, setMenus] = useState([]);
            const [recipeMap, setRecipeMap] = useState({});
            
            const [activeBanner, setActiveBanner] = useState(null);
            const [activePopup, setActivePopup] = useState(null);
            
            const [comments, setComments] = useState([]);
            const [newComment, setNewComment] = useState("");
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);

            const [currentMonth, setCurrentMonth] = useState(new Date()); 
            const [selectedDate, setSelectedDate] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [modalSearch, setModalSearch] = useState("");
            const [activeModal, setActiveModal] = useState(false);
            const [weeklyModal, setWeeklyModal] = useState(false);
            const [importantModal, setImportantModal] = useState(false);
            const [popupRecipes, setPopupRecipes] = useState([]);
            const [activeRecipeIndex, setActiveRecipeIndex] = useState(0);

            const [expandedMenu, setExpandedMenu] = useState(null);
            
            const [seasonalModal, setSeasonalModal] = useState(false);
            const [seasonalData, setSeasonalData] = useState([]);

            const [reports, setReports] = useState([]);
            const [reportModal, setReportModal] = useState(false);
            const [activeReportTab, setActiveReportTab] = useState('아침');

            const timerRef = useRef(null);

            const resetTimer = () => {
                if (timerRef.current) clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => {
                    if (isAuthenticated) {
                        alert("3시간 동안 활동이 없어 자동 로그아웃됩니다.");
                        handleLogout();
                    }
                }, INACTIVITY_LIMIT);
            };

            useEffect(() => {
                if (!isAuthenticated) return;
                const events = ['mousemove', 'keydown', 'click', 'touchstart'];
                events.forEach(ev => window.addEventListener(ev, resetTimer));
                resetTimer();
                return () => {
                    if (timerRef.current) clearTimeout(timerRef.current);
                    events.forEach(ev => window.removeEventListener(ev, resetTimer));
                };
            }, [isAuthenticated]);

            const fetchData = (forceFresh = false) => {
                if(forceFresh) setIsRefreshing(true);
                const getUrl = (url) => forceFresh ? `${url}&t=${new Date().getTime()}` : url;

                Papa.parse(getUrl(USER_URL), { 
                    download: true, header: false,
                    complete: (res) => {
                        const users = [];
                        res.data.forEach(row => { if (row.length >= 2 && row[1]) users.push({ name: (row[0]||"").trim(), code: (row[1]||"").trim() }); });
                        setUserList(users);
                    }
                });

                Papa.parse(getUrl(MENU_URL), { 
                    download: true, 
                    complete: (res) => {
                        let temp = []; let headers = [];
                        res.data.forEach(row => {
                            const label = (row[0] || "").replace(/\s/g, "");
                            const vals = row.slice(1);
                            if (label === "날짜") {
                                headers = vals.map(v => {
                                    const m = (v || "").match(/(\d{4})[^\d]*(\d{1,2})[^\d]*(\d{1,2})/);
                                    return m ? `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}` : null;
                                });
                                headers.forEach(d => { if(d) temp.push({ date: d, morning: "", lunch: "", dinner: "", duty: "", packing: "" }); });
                            } 
                            else if (headers.length > 0) {
                                vals.forEach((v, i) => {
                                    if (!headers[i]) return;
                                    const t = temp.find(m => m.date === headers[i]);
                                    if (t && v && v.trim() !== "") {
                                        if (label.includes("아침")) t.morning = v;
                                        else if (label.includes("점심")) t.lunch = v;
                                        else if (label.includes("저녁")) t.dinner = v;
                                        else if (label.includes("근무") || label.includes("당직") || label.match(/\d/)) t.duty = t.duty ? t.duty + " / " + v : v;
                                        else if (label.includes("포장") || label.includes("Takeout")) t.packing = v;
                                    }
                                });
                            }
                        });
                        setMenus(temp);

                        const now = new Date();
                        const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                        const todayMenu = temp.find(m => m.date === todayStr);
                        if(todayMenu) {
                            setSelectedDate(todayMenu);
                        } else {
                            setSelectedDate({ date: todayStr, morning: "", lunch: "", dinner: "", duty: "", packing: "" });
                        }
                    }
                });

                // ★ [v42.0] 스캐너 유지: 어디에 적든 http만 있으면 다 가져옵니다.
                Papa.parse(getUrl(RECIPE_URL), { 
                    download: true, 
                    complete: (res) => {
                        const newRecipes = {};
                        res.data.forEach(row => {
                            if (row.length < 2 || !row[0] || row[0].includes("메뉴명") || row[0].includes("Key")) return;
                            const key = row[0].trim();
                            
                            const rowString = row.join(" ");
                            let foundImage = "";
                            const urlMatch = rowString.match(/(https?:\/\/[^\s,]+)/);
                            if(urlMatch) {
                                foundImage = urlMatch[0].trim().replace(/["']$/, "");
                            }
                            
                            newRecipes[key] = { 
                                key: key, 
                                name: row[1] || key, 
                                ingredients: row[2] || "", 
                                process: row[3] || "", 
                                tip: row[4] || "", 
                                nutrition: row[5] || "",
                                image: foundImage
                            };
                        });
                        setRecipeMap(newRecipes);
                    }
                });

                if(SEASONAL_URL.includes("docs.google.com")) {
                     Papa.parse(getUrl(SEASONAL_URL), {
                        download: true,
                        complete: (res) => {
                            const data = [];
                            res.data.forEach(row => {
                                const monthStr = row[0] ? row[0].toString().replace(/[^0-9]/g, '') : '';
                                const m = parseInt(monthStr);
                                if(row.length >= 3 && !isNaN(m) && m >= 1 && m <= 12) {
                                    data.push({ 
                                        month: m, 
                                        category: row[1]?.trim() || "기타", 
                                        name: row[2]?.trim() || "", 
                                        desc: row[3]?.trim() || "", 
                                        pairing: row[4]?.trim() || "",
                                        menu: row[5]?.trim() || ""
                                    });
                                }
                            });
                            setSeasonalData(data);
                        }
                    });
                }

                if(REPORT_URL) {
                    Papa.parse(getUrl(REPORT_URL), {
                        download: true,
                        complete: (res) => {
                            const data = [];
                            res.data.forEach(row => {
                                if(row.length >= 5 && row[0] !== "날짜") {
                                    data.push({
                                        date: row[0]?.trim() || "",
                                        type: row[1]?.trim() || "아침",
                                        beforeImg: row[2]?.trim() || "",
                                        afterImg: row[3]?.trim() || "",
                                        content: row[4]?.trim() || "",
                                        author: row[5]?.trim() || ""
                                    });
                                }
                            });
                            setReports(data);
                        }
                    });
                }

                Papa.parse(getUrl(NOTICE_URL), {
                    download: true,
                    complete: (res) => {
                        const now = new Date();
                        const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                        const hiddenDate = localStorage.getItem("misoyon_notice_hidden");
                        
                        let banners = [];
                        let popup = null;
                        
                        res.data.forEach(row => {
                            if(row.length < 4 || row[0] === "구분") return;
                            const sDateStr = row[1].trim();
                            const eDateStr = row[2].trim();
                            if(!sDateStr || !eDateStr) return;
                            
                            const start = new Date(sDateStr + "T05:00:00");
                            const end = new Date(eDateStr + "T19:00:00");
                            
                            if (now >= start && now <= end) {
                                const type = row[0].trim();
                                const content = row[3].trim();
                                if (type === "배너") banners.push(content);
                                else if (type === "팝업" && hiddenDate !== todayStr) popup = content;
                            }
                        });
                        setActiveBanner(banners.length > 0 ? banners.join("   /   ") : null);
                        setActivePopup(popup);
                    }
                });
                
                Papa.parse(getUrl(COMMENT_READ_URL), {
                    download: true,
                    complete: (res) => {
                        const loadedComments = [];
                        res.data.forEach(row => {
                            if(row.length >= 4 && row[0] !== "날짜") {
                                const isImportant = row[4] && row[4].trim() !== ""; 
                                loadedComments.push({ date: row[0], name: row[1], content: row[2], time: row[3], important: isImportant });
                            }
                        });
                        loadedComments.sort((a,b) => new Date(b.date) - new Date(a.date));
                        setComments(loadedComments);
                        if(forceFresh) setTimeout(() => setIsRefreshing(false), 500);
                    }
                });
            };

            useEffect(() => { if (isAuthenticated) fetchData(false); }, [isAuthenticated]);
            useEffect(() => { const savedUser = localStorage.getItem("misoyon_user"); if (savedUser) { setIsAuthenticated(true); setCurrentUser(savedUser); } }, []);

            const handleLogin = () => {
                const foundUser = userList.find(u => u.name === inputName.trim() && u.code === inputCode.trim());
                if (foundUser) { setIsAuthenticated(true); setCurrentUser(foundUser.name); localStorage.setItem("misoyon_user", foundUser.name); }
                else if (inputName.trim() === ADMIN_NAME && inputCode.trim() === ADMIN_CODE) { setIsAuthenticated(true); setCurrentUser("관리자"); localStorage.setItem("misoyon_user", "관리자"); }
                else { setLoginError("이름 또는 코드를 확인하세요."); }
            };

            const handleLogout = () => { setIsAuthenticated(false); setCurrentUser(""); localStorage.removeItem("misoyon_user"); window.location.reload(); };
            const handleClosePopup = (hideToday) => { if (hideToday) localStorage.setItem("misoyon_notice_hidden", `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`); setActivePopup(null); };

            const handleCommentSubmit = () => {
                if (!newComment.trim() || !selectedDate) return;
                setIsSubmitting(true);
                const prefix = reportModal ? `[보고서/${activeReportTab}] ` : "";
                const commentData = { date: selectedDate.date, name: currentUser, content: prefix + newComment.trim(), action: 'write' };
                fetch(COMMENT_WRITE_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(commentData) })
                .then(() => { setComments([{ ...commentData, time: new Date().toLocaleString("ko-KR"), important: false }, ...comments]); setNewComment(""); setIsSubmitting(false); })
                .catch(err => { alert("전송 실패."); setIsSubmitting(false); });
            };

            const handleToggleImportant = (targetComment) => {
                if (currentUser !== ADMIN_NAME) return;
                const updatedComments = comments.map(c => c === targetComment ? { ...c, important: !c.important } : c);
                setComments(updatedComments);
                fetch(COMMENT_WRITE_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'toggle', date: targetComment.date, name: targetComment.name, content: targetComment.content }) }).catch(err => console.error("체크 실패"));
            };

            const getWeeklyData = () => {
                if (!selectedDate || !selectedDate.date) return [];
                try {
                    const [y, m, d] = selectedDate.date.split('-').map(Number);
                    const target = new Date(y, m - 1, d);
                    const day = target.getDay(); 
                    const weekData = [];
                    for(let i=0; i<7; i++) {
                        const tempDate = new Date(y, m - 1, d - day + i);
                        const dateStr = `${tempDate.getFullYear()}-${String(tempDate.getMonth() + 1).padStart(2, '0')}-${String(tempDate.getDate()).padStart(2, '0')}`;
                        const menu = menus.find(m => m.date === dateStr);
                        weekData.push({ date: dateStr, dayIdx: i, menu: menu });
                    }
                    return weekData;
                } catch (e) { return []; }
            };

            const calDays = useMemo(() => {
                const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= lastDate; i++) {
                    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    days.push({ day: i, dateStr: ds, data: menus.find(m => m.date === ds) });
                }
                while (days.length < 42) days.push(null);
                return days;
            }, [currentMonth, menus]);

            const currentSearchResults = useMemo(() => {
                const q = (activeModal ? modalSearch : searchTerm).trim();
                if (!q) return [];
                const query = q.toLowerCase().replace(/\s+/g, "");
                const isMonthSearch = q.endsWith("월") || (!isNaN(q) && parseInt(q) <= 12);
                return menus.filter(m => {
                    if (isMonthSearch) return String(new Date(m.date).getMonth() + 1).padStart(2, '0') === q.replace("월","").padStart(2,'0');
                    return (m.morning + m.lunch + m.dinner + (m.duty||"") + (m.packing||"")).toLowerCase().replace(/\s+/g, "").includes(query);
                }).sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [modalSearch, searchTerm, activeModal, menus]);

            const importantComments = comments.filter(c => c.important);
            const weekDays = ['일','월','화','수','목','금','토'];
            const yearOptions = Array.from({length: 16}, (_, i) => 2020 + i);
            const currentRecipe = popupRecipes[activeRecipeIndex];
            const weeklyData = getWeeklyData();
            const todayComments = selectedDate ? comments.filter(c => c.date === selectedDate.date) : [];
            
            const todayReports = selectedDate ? reports.filter(r => r.date === selectedDate.date) : [];
            const currentTabReport = todayReports.find(r => r.type === activeReportTab);

            const handleExpandMenu = (type, text) => {
                if(!text) return;
                setExpandedMenu({ type, text });
            };
            
            const groupedSeasonal = useMemo(() => {
                const thisMonth = currentMonth.getMonth() + 1;
                const thisMonthData = seasonalData.filter(d => d.month === thisMonth);
                
                return thisMonthData.reduce((acc, item) => {
                    const cat = item.category || '기타';
                    if(!acc[cat]) acc[cat] = [];
                    acc[cat].push(item);
                    return acc;
                }, {});
            }, [seasonalData, currentMonth]);

            if (!isAuthenticated) {
                return (
                    <div className="login-screen">
                        <div className="login-box">
                            <h1 className="text-3xl font-black italic tracking-tighter mb-2">Mise-On</h1>
                            <p className="text-xs text-blue-600 font-bold mb-1 uppercase tracking-widest">Digital Mise-en-place</p>
                            <p className="text-[10px] text-slate-400 font-bold mb-6">Powered by Chef D.S. Kim</p>
                            
                            <input type="text" className="login-input" placeholder="이름 (Name)" value={inputName} onChange={e => setInputName(e.target.value)} />
                            <input type="password" inputMode="numeric" className="login-input" placeholder="비밀번호 (Code)" value={inputCode} onChange={e => setInputCode(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
                            <button onClick={handleLogin} className="login-btn">LOGIN</button>
                            <div className="mt-4 pt-4 border-t border-slate-100">
                                <button onClick={() => fetchData(true)} className="text-xs text-slate-400 font-bold flex items-center justify-center gap-1 w-full hover:text-blue-500">
                                    <span className={isRefreshing ? "spin-anim" : ""}>🔄</span> 
                                    {isRefreshing ? "명단 업데이트 중..." : "로그인이 안 되나요? (최신 명단 가져오기)"}
                                </button>
                            </div>
                            {loginError && <p className="text-red-500 text-xs font-bold mt-3">{loginError}</p>}
                            <div className="mt-8 text-[10px] text-slate-300">Client: Misoyeon (味笑宴)</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full w-full">
                    {activeBanner && <div className="top-banner"><span className="banner-icon">NOTICE</span><span>{activeBanner}</span></div>}

                    <header className="flex flex-col px-4 py-3 bg-white border-b gap-3 shrink-0">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter">Mise-On <span className="text-blue-600 text-xs not-italic align-top">v42.0</span></h1>
                                <div className="text-[10px] text-slate-400 font-bold">Site: 미소연(味笑宴)</div>
                            </div>
                            <div className="hidden md:flex items-center bg-blue-50 text-blue-600 px-3 py-1 rounded-xl border border-blue-100 font-bold text-xs">👨‍🍳 {currentUser}</div>
                        </div>
                        <div className="flex gap-2">
                            <div className="flex-1 flex items-center justify-center bg-slate-100 px-3 py-2 rounded-xl border font-bold text-sm">
                                <select className="bg-transparent" value={currentMonth.getFullYear()} onChange={(e)=>setCurrentMonth(new Date(e.target.value, currentMonth.getMonth()))}>{yearOptions.map(y => <option key={y} value={y}>{y}년</option>)}</select>
                                <span className="mx-1">/</span>
                                <select className="bg-transparent" value={currentMonth.getMonth() + 1} onChange={(e)=>setCurrentMonth(new Date(currentMonth.getFullYear(), e.target.value - 1))}>{Array.from({length:12},(_,i)=>i+1).map(m => <option key={m} value={m}>{m}월</option>)}</select>
                            </div>
                            <button onClick={() => fetchData(true)} className="bg-slate-800 text-white px-3 py-2 rounded-xl font-black text-xs flex items-center gap-1">
                                <span className={isRefreshing ? "spin-anim" : ""}>🔄</span> <span>{isRefreshing ? "갱신" : "갱신"}</span>
                            </button>
                            <button onClick={handleLogout} className="bg-red-500 text-white px-3 py-2 rounded-xl font-black text-xs">OUT</button>
                        </div>
                        <div className="flex gap-2">
                            <input className="flex-1 bg-slate-100 px-3 py-2 rounded-xl text-xs font-bold border outline-none" placeholder="메세지를 입력하세요 (예: 제육, 1월)" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} onKeyDown={e=>e.key==='Enter' && (setModalSearch(searchTerm), setActiveModal(true))}/>
                            <button onClick={()=>{setModalSearch(searchTerm); setActiveModal(true);}} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-xs">GO</button>
                        </div>
                    </header>

                    <main className="flex flex-col lg:flex-row flex-1 overflow-hidden">
                        <div className="flex-[2] flex flex-col min-h-[55%] lg:min-h-full border-b lg:border-b-0 lg:border-r overflow-hidden">
                            <div className="calendar-grid">
                                {weekDays.map(d=><div key={d} className="calendar-header">{d}</div>)}
                                {calDays.map((d,i)=>(
                                    <div key={i} className={`calendar-day ${d?.dateStr === selectedDate?.date ? 'selected' : ''}`} onClick={()=>d?.data && setSelectedDate(d.data)}>
                                        {d && (<><span className={`text-[10px] font-black ${d.data ? 'text-slate-800' : 'text-slate-300'}`}>{d.day}</span>
                                        {d.data && (<div className="flex flex-col gap-[1px] mt-[1px]">
                                            {d.data.morning && <div className="menu-text bg-orange-50 text-orange-600">조:{d.data.morning}</div>}
                                            {d.data.lunch && <div className="menu-text bg-blue-50 text-blue-600">중:{d.data.lunch}</div>}
                                            {d.data.dinner && <div className="menu-text bg-purple-50 text-purple-600">석:{d.data.dinner}</div>}
                                        </div>)}</>)}
                                    </div>
                                ))}
                            </div>
                            <div className="p-2 bg-white border-t space-y-2">
                                <button onClick={()=>setSeasonalModal(true)} className="w-full bg-green-500 text-white py-3 rounded-xl font-black text-sm shadow-sm hover:bg-green-600 transition-colors flex items-center justify-center gap-2">
                                    <span>🌿 {currentMonth.getMonth()+1}월의 제철 식재료</span>
                                    {Object.keys(groupedSeasonal).length > 0 && <span className="bg-white text-green-700 text-xs px-2 py-0.5 rounded-full">{Object.values(groupedSeasonal).flat().length}</span>}
                                </button>
                                <button onClick={()=>setImportantModal(true)} className="w-full bg-yellow-400 text-yellow-900 py-3 rounded-xl font-black text-sm shadow-sm hover:bg-yellow-500 transition-colors flex items-center justify-center gap-2">
                                    <span>⭐ 중요 리뷰 모아보기</span><span className="bg-white text-yellow-800 text-xs px-2 py-0.5 rounded-full">{importantComments.length}</span>
                                </button>
                            </div>
                        </div>

                        <aside className="flex-1 bg-white p-4 overflow-y-auto min-h-[45%]">
                            {selectedDate ? (
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center border-b-2 border-blue-600 pb-1">
                                        <h2 className="text-xl font-black italic">DAILY MENU</h2>
                                        <button onClick={()=>setWeeklyModal(true)} className="bg-slate-800 text-white px-3 py-1 rounded-lg text-xs font-bold shadow-lg hover:bg-slate-700 transition-all">📅 주간표 보기</button>
                                    </div>
                                    <div className="font-bold text-slate-500 text-sm mb-2">{selectedDate.date}</div>
                                    
                                    {todayReports.length > 0 && (
                                        <button onClick={() => {setReportModal(true); setActiveReportTab('아침');}} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-sm shadow-md hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2 mb-3">
                                            <span>📷 현장 보고서 확인 ({todayReports.length}건)</span>
                                        </button>
                                    )}

                                    {selectedDate.duty && <div className="p-4 rounded-xl border mb-3 bg-slate-50 border-slate-200"><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Schedule</div><div className="text-sm font-black text-slate-800">👨‍🍳 {selectedDate.duty}</div></div>}
                                    <MenuCard text={selectedDate.morning} type="Morning" recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} onExpand={handleExpandMenu} />
                                    <MenuCard text={selectedDate.lunch} type="Lunch" recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} onExpand={handleExpandMenu} />
                                    <MenuCard text={selectedDate.dinner} type="Dinner" recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} onExpand={handleExpandMenu} />
                                    {selectedDate.packing && <div className="p-4 rounded-xl border mb-3 bg-green-50 border-green-200"><div className="text-[10px] font-black text-green-700 uppercase mb-1">Takeout</div><div className="text-sm font-black text-green-900">🎁 {selectedDate.packing}</div></div>}
                                    
                                    <div className="mt-8 pt-4 border-t-2 border-slate-100">
                                        <h3 className="text-sm font-black text-slate-400 uppercase mb-3">💬 오늘의 한마디</h3>
                                        <div className="space-y-3 mb-4">
                                            {todayComments.length > 0 ? todayComments.map((c, i) => (
                                                <div key={i} className={`p-3 rounded-xl border transition-all ${c.important ? 'bg-yellow-50 border-yellow-200 ring-2 ring-yellow-100' : 'bg-slate-50'}`}>
                                                    <div className="flex justify-between items-center mb-1">
                                                        <div className="flex items-center gap-1">
                                                            {currentUser === ADMIN_NAME && <input type="checkbox" className="imp-check mr-1" checked={c.important} onChange={()=>handleToggleImportant(c)} />}
                                                            {c.important && <span className="text-xs">⭐</span>}
                                                            <span className={`text-xs font-black ${c.important ? 'text-yellow-700' : 'text-blue-600'}`}>{c.name}</span>
                                                        </div>
                                                        <span className="text-[10px] text-slate-400">{c.time}</span>
                                                    </div>
                                                    <div className={`text-xs font-bold whitespace-pre-wrap ${c.important ? 'text-slate-800' : 'text-slate-700'}`}>{c.content}</div>
                                                </div>
                                            )) : <div className="text-center text-xs text-slate-300 py-2">아직 댓글이 없습니다.</div>}
                                        </div>
                                        <div className="flex gap-2">
                                            <input className="flex-1 bg-slate-100 px-3 py-2 rounded-xl text-xs font-bold outline-none border focus:border-blue-500" placeholder="메세지를 입력하세요..." value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleCommentSubmit()} disabled={isSubmitting}/>
                                            <button onClick={handleCommentSubmit} disabled={isSubmitting} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-slate-700 disabled:opacity-50">{isSubmitting ? "..." : "전송"}</button>
                                        </div>
                                    </div>
                                </div>
                            ) : <div className="h-full flex items-center justify-center text-slate-300 font-black">SELECT DATE</div>}
                        </aside>
                    </main>

                    {reportModal && (
                        <div className="modal-view bg-slate-50">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className="text-xl font-black italic text-indigo-600">📷 현장 보고서</h2>
                                <button onClick={()=>setReportModal(false)} className="text-3xl">×</button>
                            </div>
                            
                            <div className="flex gap-2 mb-4 shrink-0">
                                {['아침', '점심', '저녁'].map(tab => (
                                    <button 
                                        key={tab} 
                                        onClick={() => setActiveReportTab(tab)}
                                        className={`flex-1 py-2 rounded-xl text-sm font-black transition-all ${activeReportTab === tab ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`}
                                    >
                                        {tab === '아침' ? '☀️ 아침' : tab === '점심' ? '🌞 점심' : '🌙 저녁'}
                                    </button>
                                ))}
                            </div>

                            <div className="flex-1 overflow-y-auto pb-4 space-y-4">
                                {currentTabReport ? (
                                    <>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <div className="flex-1">
                                                <div className="text-xs font-black text-slate-400 mb-1">식전 세팅 상태</div>
                                                {currentTabReport.beforeImg ? (
                                                    <img src={formatImageUrl(currentTabReport.beforeImg)} alt="식전 사진" className="w-full h-auto max-h-[400px] object-contain rounded-xl border bg-slate-200 shadow-sm" />
                                                ) : (
                                                    <div className="w-full h-48 bg-slate-200 rounded-xl flex items-center justify-center text-xs font-bold text-slate-400">사진 없음</div>
                                                )}
                                            </div>
                                            <div className="flex-1">
                                                <div className="text-xs font-black text-slate-400 mb-1">식후 잔반 상태</div>
                                                {currentTabReport.afterImg ? (
                                                    <img src={formatImageUrl(currentTabReport.afterImg)} alt="식후 사진" className="w-full h-auto max-h-[400px] object-contain rounded-xl border bg-slate-200 shadow-sm" />
                                                ) : (
                                                    <div className="w-full h-48 bg-slate-200 rounded-xl flex items-center justify-center text-xs font-bold text-slate-400">사진 없음</div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="bg-white p-4 rounded-xl border shadow-sm mt-4">
                                            <div className="text-xs text-indigo-600 font-black mb-2">보고내용 | 작성자: {currentTabReport.author}</div>
                                            <div className="text-sm font-bold text-slate-800 whitespace-pre-wrap leading-relaxed">{currentTabReport.content}</div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-10 bg-white rounded-xl border border-dashed border-slate-300 text-slate-400 font-bold">
                                        해당 끼니의 보고서가 등록되지 않았습니다.
                                    </div>
                                )}

                                <div className="mt-8 pt-4 border-t-2 border-slate-200">
                                    <h3 className="text-sm font-black text-slate-400 uppercase mb-3">💬 통합 피드백 및 코멘트</h3>
                                    <div className="space-y-3 mb-4">
                                        {todayComments.length > 0 ? todayComments.map((c, i) => (
                                            <div key={i} className={`p-3 rounded-xl border transition-all ${c.important ? 'bg-yellow-50 border-yellow-200' : 'bg-white'}`}>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className={`text-xs font-black ${c.important ? 'text-yellow-700' : 'text-blue-600'}`}>{c.name}</span>
                                                    <span className="text-[10px] text-slate-400">{c.time}</span>
                                                </div>
                                                <div className="text-xs font-bold text-slate-700 whitespace-pre-wrap">{c.content}</div>
                                            </div>
                                        )) : <div className="text-center text-xs text-slate-300 py-4">아직 코멘트가 없습니다.</div>}
                                    </div>
                                    <div className="flex gap-2">
                                        <input className="flex-1 bg-white px-3 py-2 rounded-xl text-xs font-bold outline-none border focus:border-indigo-500" placeholder="보고서에 대한 피드백을 남겨주세요..." value={newComment} onChange={e=>setNewComment(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleCommentSubmit()} disabled={isSubmitting}/>
                                        <button onClick={handleCommentSubmit} disabled={isSubmitting} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-indigo-700 disabled:opacity-50">{isSubmitting ? "..." : "등록"}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {seasonalModal && (
                        <div className="modal-view">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className="text-xl font-black italic text-green-600">🌿 {currentMonth.getMonth()+1}월의 제철 식재료</h2>
                                <button onClick={()=>setSeasonalModal(false)} className="text-3xl">×</button>
                            </div>
                            <div className="flex-1 overflow-y-auto pb-10 px-1">
                                {Object.keys(groupedSeasonal).length > 0 ? (
                                    Object.keys(groupedSeasonal).map(cat => (
                                        <div key={cat} className="mb-8">
                                            <div className="flex items-center gap-2 mb-3 border-b-2 border-green-500 pb-1 w-max">
                                                <span className="text-lg font-black text-green-800">
                                                    {cat.includes('수산') ? '🐟' : cat.includes('과일') || cat.includes('채소') ? '🥬' : '✨'} {cat}
                                                </span>
                                            </div>
                                            <div className="space-y-3">
                                                {groupedSeasonal[cat].map((item, i) => (
                                                    <div key={i} className="bg-white p-4 rounded-xl border border-green-200 shadow-sm relative overflow-hidden flex gap-4">
                                                        <div className="absolute top-0 left-0 w-1 h-full bg-green-400"></div>
                                                        <div className="w-16 h-16 bg-slate-50 rounded-xl flex items-center justify-center text-4xl shrink-0 shadow-inner border border-slate-100">
                                                            {getFoodEmoji(item.name, item.category)}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-black text-green-900 text-lg mb-1">{item.name}</div>
                                                            <div className="text-sm text-slate-700 font-bold leading-relaxed mb-2">{item.desc}</div>
                                                            <div className="flex flex-col gap-1.5 mt-2">
                                                                {item.menu && (
                                                                    <div className="bg-blue-50 px-2.5 py-1.5 rounded-lg border border-blue-100 text-xs font-bold text-blue-900 inline-flex items-start gap-2 max-w-full">
                                                                        <span className="shrink-0">🍳 추천요리:</span> 
                                                                        <span className="break-words whitespace-pre-wrap leading-tight">{item.menu}</span>
                                                                    </div>
                                                                )}
                                                                {item.pairing && (
                                                                    <div className="bg-orange-50 px-2.5 py-1.5 rounded-lg border border-orange-100 text-xs font-bold text-orange-950 inline-flex items-start gap-2 max-w-full">
                                                                        <span className="shrink-0 text-orange-600">🤝 찰떡궁합:</span> 
                                                                        <span className="break-words whitespace-pre-wrap leading-tight">{item.pairing}</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="text-center py-10 text-slate-400 font-bold">
                                        등록된 제철 재료가 없습니다.<br/>
                                        <span className="text-xs font-normal">(구글 시트 '제철재료' 탭을 확인해주세요)</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {expandedMenu && (
                        <div className="zoom-popup" onClick={() => setExpandedMenu(null)}>
                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                <div>
                                    <div className="text-sm font-black text-slate-400 uppercase mb-1">{selectedDate.date}</div>
                                    <div className="text-3xl font-black italic text-blue-600">{expandedMenu.type}</div>
                                </div>
                                <button onClick={() => setExpandedMenu(null)} className="text-4xl text-slate-300">×</button>
                            </div>
                            <div className="flex-1 overflow-y-auto flex items-center justify-center">
                                <div className="text-2xl md:text-4xl font-black text-slate-800 leading-relaxed text-center whitespace-pre-wrap">
                                    {expandedMenu.text}
                                </div>
                            </div>
                            <div className="text-center text-xs text-slate-400 mt-6 font-bold">화면을 터치하면 닫힙니다</div>
                        </div>
                    )}

                    {importantModal && (
                        <div className="modal-view">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className="text-xl font-black italic text-yellow-600">⭐ IMPORTANT REVIEWS</h2>
                                <button onClick={()=>setImportantModal(false)} className="text-3xl">×</button>
                            </div>
                            <div className="flex-1 overflow-y-auto pb-10 space-y-6">
                                {importantComments.length > 0 ? importantComments.map((c, i) => {
                                    const menu = menus.find(m => m.date === c.date);
                                    return (
                                        <div key={i} className="bg-white p-4 rounded-xl border-2 border-yellow-200 shadow-md">
                                            <div className="bg-slate-50 p-3 rounded-lg border mb-3">
                                                <div className="font-black text-blue-600 mb-2 border-b pb-1">{c.date}</div>
                                                {menu ? (<div className="text-xs font-bold space-y-1">
                                                    <div className="flex gap-2"><span className="text-orange-500 w-6">아침</span> <span className="text-slate-600">{menu.morning}</span></div>
                                                    <div className="flex gap-2"><span className="text-blue-500 w-6">점심</span> <span className="text-slate-600">{menu.lunch}</span></div>
                                                    <div className="flex gap-2"><span className="text-purple-500 w-6">저녁</span> <span className="text-slate-600">{menu.dinner}</span></div>
                                                </div>) : <div className="text-xs text-slate-300">메뉴 정보 없음</div>}
                                            </div>
                                            <div className="flex justify-between items-center mb-1 px-1">
                                                <div className="flex items-center gap-1"><span className="text-xs">⭐</span><span className="text-xs font-black text-yellow-800">{c.name}</span></div><span className="text-[10px] text-slate-400">{c.time}</span>
                                            </div>
                                            <div className="text-sm font-bold text-slate-800 bg-yellow-50 p-3 rounded-lg">{c.content}</div>
                                        </div>
                                    );
                                }) : <div className="text-center py-10 text-slate-400 font-bold">중요한 피드백이 없습니다.</div>}
                            </div>
                        </div>
                    )}

                    {weeklyModal && selectedDate && (
                        <div className="modal-view">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className="text-xl font-black italic">WEEKLY MENU PLAN</h2>
                                <button onClick={()=>setWeeklyModal(false)} className="text-3xl">×</button>
                            </div>
                            <div className="flex-1 overflow-y-auto pb-10">
                                {weeklyData.map((d, i) => (
                                    <div key={i} className={`mb-4 p-3 border rounded-xl ${d.date === selectedDate.date ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-100' : 'bg-slate-50'}`}>
                                        <div className={`font-black mb-2 flex justify-between ${d.date === selectedDate.date ? 'text-blue-600' : 'text-slate-600'}`}>
                                            <span>{d.date} ({weekDays[d.dayIdx]})</span>
                                            {d.date === selectedDate.date && <span className="text-xs bg-blue-600 text-white px-2 py-0.5 rounded">선택됨</span>}
                                        </div>
                                        {d.menu ? (
                                            <div className="grid grid-cols-1 gap-3">
                                                <WeeklyMenuRow label="아침" colorClass="text-orange-500" text={d.menu.morning} recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} />
                                                <WeeklyMenuRow label="점심" colorClass="text-blue-500" text={d.menu.lunch} recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} />
                                                <WeeklyMenuRow label="저녁" colorClass="text-purple-500" text={d.menu.dinner} recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} />
                                            </div>
                                        ) : <div className="text-slate-400 text-xs font-bold">등록된 메뉴 없음</div>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeModal && (
                        <div className="modal-view">
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className="text-xl font-black italic">SEARCH RESULT</h2>
                                <button onClick={()=>setActiveModal(false)} className="text-3xl">×</button>
                            </div>
                            <input className="bg-slate-100 px-4 py-3 rounded-xl w-full font-bold mb-4 border-2 border-blue-500 outline-none" placeholder="검색어..." autoFocus value={modalSearch} onChange={e=>setModalSearch(e.target.value)}/>
                            <div className="flex-1 overflow-y-auto space-y-4 pb-10">
                                {currentSearchResults.length > 0 ? currentSearchResults.map((m, i) => (
                                    <div key={i} className="bg-slate-50 p-4 rounded-xl border">
                                        <div className="font-black text-blue-600 mb-2">{m.date}</div>
                                        <MenuCard text={m.morning} type="Morning" query={modalSearch} recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} onExpand={handleExpandMenu} />
                                        <MenuCard text={m.lunch} type="Lunch" query={modalSearch} recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} onExpand={handleExpandMenu} />
                                        <MenuCard text={m.dinner} type="Dinner" query={modalSearch} recipeMap={recipeMap} setPopupRecipes={setPopupRecipes} setActiveRecipeIndex={setActiveRecipeIndex} onExpand={handleExpandMenu} />
                                    </div>
                                )) : <div className="text-center py-10 text-slate-400 font-bold">결과 없음</div>}
                            </div>
                        </div>
                    )}

                    {/* ★ [v42.0 핵심] 사진을 억지로 끼워넣지 않고, 깔끔한 '사진 보기' 버튼으로 변경! */}
                    {popupRecipes.length > 0 && currentRecipe && (
                        <div className="recipe-popup" onClick={() => setPopupRecipes([])}>
                            <div className="bg-white rounded-3xl w-full max-w-lg p-6 shadow-2xl overflow-y-auto max-h-[85vh]" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-xl font-black uppercase italic text-blue-600">Recipe Master</h3>
                                    <button onClick={() => setPopupRecipes([])} className="text-4xl font-thin">×</button>
                                </div>
                                {popupRecipes.length > 1 && (
                                    <div className="flex overflow-x-auto border-b mb-4 no-scrollbar">
                                        {popupRecipes.map((r, i) => <div key={i} onClick={() => setActiveRecipeIndex(i)} className={`tab-btn whitespace-nowrap ${i === activeRecipeIndex ? 'active' : ''}`}>{r.name}</div>)}
                                    </div>
                                )}
                                <div className="animate-in fade-in zoom-in-95 duration-200">
                                    <div className="flex gap-4 items-start mb-4">
                                        <div className="flex-1">
                                            <div className="bg-blue-600 text-white px-3 py-1 rounded-full inline-block text-xs font-black mb-3 uppercase">{currentRecipe.name}</div>
                                            <div>
                                                <div className="text-[10px] font-black text-slate-400 uppercase mb-1">Ingredients</div>
                                                <div className="recipe-content bg-slate-50 p-3 rounded-xl border">{currentRecipe.ingredients}</div>
                                            </div>
                                        </div>
                                        
                                        {/* 구글 드라이브 링크가 있으면 멋진 사진 보기 버튼을 띄워줍니다! */}
                                        {currentRecipe.image && (
                                            <a 
                                                href={currentRecipe.image} 
                                                target="_blank" 
                                                rel="noopener noreferrer" 
                                                className="w-24 h-24 flex flex-col items-center justify-center rounded-xl shrink-0 border-2 border-blue-200 bg-blue-50 hover:bg-blue-100 transition-all text-center no-underline shadow-sm"
                                            >
                                                <span className="text-2xl mb-1">📸</span>
                                                <span className="text-[10px] font-black text-blue-700">완성사진<br/>크게보기</span>
                                            </a>
                                        )}
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <div><div className="text-[10px] font-black text-slate-400 uppercase mb-1">Instructions</div><div className="recipe-content bg-slate-50 p-3 rounded-xl border">{currentRecipe.process}</div></div>
                                        {currentRecipe.tip && <div className="bg-orange-50 p-3 rounded-xl border border-orange-100 font-bold text-orange-950 text-xs">💡 {currentRecipe.tip}</div>}
                                        {currentRecipe.nutrition && <div className="bg-teal-50 p-3 rounded-xl border border-teal-100 font-bold text-teal-900 text-xs">📊 {currentRecipe.nutrition}</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<MiseOnApp />);
    </script>
</body>
</html>
